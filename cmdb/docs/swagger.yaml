host: localhost:9080
info:
  contact:
    email: support@example.com
    name: API Support
    url: http://www.example.com/support
  description: CMDB (Configuration Management Database) - 模型配置与实例管理 API
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: CMDB API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with username and password, returns a bearer token
      parameters:
      - description: Username and password
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login
      tags:
      - Auth
  /auth/logout:
    post:
      description: Invalidate the current bearer token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
      summary: Logout
      tags:
      - Auth
  /auth/me:
    get:
      description: Return the authenticated user's info
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get current user
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user account
      parameters:
      - description: Username and password
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register
      tags:
      - Auth
  /chat:
    post:
      consumes:
      - application/json
      description: Proxy chat completion request to an LLM API with SSE streaming.
        Records token usage.
      parameters:
      - description: Chat request (baseUrl, apiKey, model, messages, source)
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - text/event-stream
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Chat completion (SSE stream)
      tags:
      - Chat
  /chat-histories:
    get:
      description: List all chat histories for the current user
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20, max 200)
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.PaginatedResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List chat histories
      tags:
      - Chat Histories
    post:
      consumes:
      - application/json
      description: Create a new chat history
      parameters:
      - description: Chat history payload (title, messages)
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.ChatHistory'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create chat history
      tags:
      - Chat Histories
  /chat-histories/{id}:
    delete:
      description: Delete a chat history by ID
      parameters:
      - description: Chat history ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete chat history
      tags:
      - Chat Histories
    get:
      description: Get a single chat history by ID
      parameters:
      - description: Chat history ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.ChatHistory'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get chat history
      tags:
      - Chat Histories
    put:
      consumes:
      - application/json
      description: Update a chat history's title and/or messages
      parameters:
      - description: Chat history ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update (title, messages)
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.ChatHistory'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update chat history
      tags:
      - Chat Histories
  /check-permission:
    get:
      description: Check if current user has a specific permission on a resource
      parameters:
      - description: Resource type
        in: query
        name: resource_type
        required: true
        type: string
      - description: Resource ID
        in: query
        name: resource_id
        required: true
        type: string
      - description: Permission code
        in: query
        name: permission
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Check permission
      tags:
      - Permissions
  /hosts:
    get:
      description: Get paginated host list
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 5, max 50)
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List hosts
      tags:
      - Hosts
    post:
      consumes:
      - application/json
      description: Create a new host entry
      parameters:
      - description: Host data
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.HostRecord'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a host
      tags:
      - Hosts
  /hosts/{id}:
    delete:
      description: Delete a host by ID
      parameters:
      - description: Host ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a host
      tags:
      - Hosts
    get:
      description: Get host by ID
      parameters:
      - description: Host ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.HostRecord'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a host
      tags:
      - Hosts
    put:
      consumes:
      - application/json
      description: Update host information
      parameters:
      - description: Host ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated host data
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.HostRecord'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a host
      tags:
      - Hosts
  /hosts/{id}/credentials:
    get:
      description: Get actual password and private key for a host (internal use only)
      parameters:
      - description: Host ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get host credentials
      tags:
      - Hosts
  /inspection-history:
    get:
      description: Get paginated inspection history records
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20, max 100)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List inspection history
      tags:
      - Inspection History
    post:
      consumes:
      - application/json
      description: Create a new inspection history record
      parameters:
      - description: Inspection record payload (host_id, host_name, host_ip, status,
          output, error, analysis, duration_ms)
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.InspectionRecord'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create inspection history
      tags:
      - Inspection History
  /linxi-chat/sessions:
    get:
      description: List all Linxi chat sessions for the current user
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20, max 200)
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.PaginatedResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List Linxi chat sessions
      tags:
      - Linxi Chat
    post:
      consumes:
      - application/json
      description: Create a new Linxi chat session, optionally with initial messages
      parameters:
      - description: Session payload (title, messages)
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.LinxiSession'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create Linxi chat session
      tags:
      - Linxi Chat
  /linxi-chat/sessions/{id}:
    delete:
      description: Delete a Linxi chat session by ID
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete Linxi chat session
      tags:
      - Linxi Chat
    put:
      consumes:
      - application/json
      description: Update a Linxi chat session title
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update (title)
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.LinxiSession'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update Linxi chat session
      tags:
      - Linxi Chat
  /linxi-chat/sessions/{id}/messages:
    get:
      description: List all messages in a Linxi chat session
      parameters:
      - description: Session ID
        in: path
